# Isolated test: 3 hermes agents + Continuwuity Matrix server + Honcho
#
# Build:  docker compose -f docker-compose.agent-test.yml build
# Start:  docker compose -f docker-compose.agent-test.yml up continuwuity honcho-api honcho-db honcho-redis -d
# Setup:  python3 agent-test/scenario.py
# Run:    docker compose -f docker-compose.agent-test.yml --env-file agent-test/.env.agents up -d
# Chat:   docker exec -it hermes-introducer-hermes-of-bob-1 hermes chat
# Test:   python3 agent-test/test_e2e.py

services:
  continuwuity:
    image: ghcr.io/continuwuity/continuwuity:latest
    ports: ["6167:6167"]
    volumes:
      - ./continuwuity.toml:/etc/conduwuit.toml
      - continuwuity-agent-test:/var/lib/conduwuit
    environment:
      CONDUWUIT_CONFIG: /etc/conduwuit.toml

  honcho-db:
    image: pgvector/pgvector:pg15
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  honcho-redis:
    image: redis:8.2
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  honcho-api:
    build:
      context: /home/amiller/projects/honcho-local
      dockerfile: Dockerfile
    depends_on:
      honcho-db:
        condition: service_healthy
      honcho-redis:
        condition: service_healthy
    ports: ["8100:8000"]
    environment:
      DB_CONNECTION_URI: postgresql+psycopg://postgres:postgres@honcho-db:5432/postgres
      CACHE_URL: redis://honcho-redis:6379/0?suppress=true

  hermes-of-alice: &agent
    build:
      context: .
      dockerfile: agent-test/Dockerfile
    environment: &agent-env
      HERMES_MODEL: zai/glm-4.7
      GLM_API_KEY: ${ZAI_API_KEY}
      GLM_BASE_URL: https://api.z.ai/api/coding/paas/v4
      MATRIX_HOMESERVER: http://continuwuity:6167
      MATRIX_USER_ID: ${ALICE_USER_ID}
      MATRIX_ACCESS_TOKEN: ${ALICE_ACCESS_TOKEN}
      HONCHO_BASE_URL: http://honcho-api:8000
    depends_on: [continuwuity, honcho-api]
    stdin_open: true
    tty: true

  hermes-of-bob:
    <<: *agent
    environment:
      <<: *agent-env
      MATRIX_USER_ID: ${BOB_USER_ID}
      MATRIX_ACCESS_TOKEN: ${BOB_ACCESS_TOKEN}

  hermes-of-carol:
    <<: *agent
    environment:
      <<: *agent-env
      MATRIX_USER_ID: ${CAROL_USER_ID}
      MATRIX_ACCESS_TOKEN: ${CAROL_ACCESS_TOKEN}

volumes:
  continuwuity-agent-test:
